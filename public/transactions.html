<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transactions</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --primary-blue: #1e3a8a;
      --secondary-blue: #3b82f6;
      --light-blue: #eff6ff;
      --accent-blue: #2563eb;
    }

    body {
      background: var(--light-blue);
    }

    .navbar {
      background-color: var(--primary-blue) !important;
    }

    .card {
      border: none;
      border-radius: 12px;
    }

    .btn-primary {
      background-color: var(--secondary-blue);
      border: none;
    }

    .btn-primary:hover {
      background-color: var(--accent-blue);
    }

    .mono {
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>

<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold">Budget App</a>
      <div class="ms-auto">
        <a href="dashboard.html" class="btn btn-outline-light me-2">Dashboard</a>
        <a href="transactions.html" class="btn btn-outline-light me-2">Transactions</a>
        <a href="budgets.html" class="btn btn-outline-light me-2">Budgets</a>
        <a href="profile.html" class="btn btn-outline-light">Profile</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="h3 mb-4">All Transactions</h1>

    <!-- Account Balance -->
    <div class="card mb-4 shadow-sm">
      <div class="card-body d-flex justify-content-between">
        <h5 class="mb-0">Current Balance</h5>
        <h5 id="balance" class="mono">$0.00</h5>
      </div>
    </div>

    <!-- Add Transaction Form -->
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <form id="txnForm" class="row g-3">
          <div class="col-md-3">
            <input type="date" id="date" class="form-control" required />
          </div>
          <div class="col-md-3">
            <input type="text" id="category" class="form-control" placeholder="Category" required />
          </div>
          <div class="col-md-3">
            <input type="text" id="description" class="form-control" placeholder="Description" />
          </div>
          <div class="col-md-2">
            <input type="number" id="amount" class="form-control" placeholder="Amount" required />
          </div>
          <div class="col-md-1 d-grid">
            <button class="btn btn-primary">Add</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Transactions Table -->
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th class="text-end">Amount</th>
              </tr>
            </thead>
            <tbody id="transactionsBody"></tbody>
          </table>
        </div>

        <div id="transactionsEmpty" class="alert alert-secondary mt-3 mb-0 d-none">
          No transactions to display yet.
        </div>
      </div>
    </div>
  </main>

  <script>
    // Format money
    function money(v) {
      const n = Number(v);
      if (Number.isNaN(n)) return "$0.00";
      return n.toLocaleString(undefined, { style: "currency", currency: "USD" });
    }

    // Safe text
    function safeText(v) {
      return (v === null || v === undefined || v === "") ? "—" : String(v);
    }

    // Load transactions from backend
    async function loadTransactions() {
      try {
        const res = await fetch("/api/transactions/all");
        if (!res.ok) throw new Error("Failed to load transactions");

        const data = await res.json();
        const txns = data.transactions ?? [];

        const tbody = document.getElementById("transactionsBody");
        const emptyMsg = document.getElementById("transactionsEmpty");
        tbody.innerHTML = "";

        // Update balance
        const balance = txns.reduce((sum, t) => sum + Number(t.amount), 0);
        document.getElementById("balance").textContent = money(balance);

        if (txns.length === 0) {
          emptyMsg.classList.remove("d-none");
          return;
        }
        emptyMsg.classList.add("d-none");

        txns.forEach(t => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="mono">${safeText(t.txn_date)}</td>
            <td>${safeText(t.category)}</td>
            <td>${safeText(t.description)}</td>
            <td class="text-end mono">${money(t.amount)}</td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        console.error(err);
        alert("Failed to load transactions: " + err.message);
      }
    }

    // Handle form submit
    document.getElementById("txnForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const txn = {
        txn_date: document.getElementById("date").value,
        category: document.getElementById("category").value,
        description: document.getElementById("description").value,
        amount: Number(document.getElementById("amount").value)
      };

      if (!txn.txn_date || !txn.category || isNaN(txn.amount)) {
        alert("Please fill all required fields correctly");
        return;
      }

      try {
        const res = await fetch("/api/transactions/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(txn)
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || "Failed to add transaction");
        }

        this.reset();
        loadTransactions();

      } catch (err) {
        console.error(err);
        alert(err.message);
      }
    });

    // Initial load
    loadTransactions();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
