<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — BudgeIt</title>

  <script>
    (function() {
      const t = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- Theme Toggle -->
  <div style="position:fixed;top:1rem;right:1rem;z-index:999;">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <i class="fas fa-moon" id="themeIcon"></i>
    </button>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <i class="fas fa-wallet"></i>
        </div>
        <span class="auth-logo-text">BudgeIt</span>
      </div>

      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Start managing your finances today</p>

      <!-- Alert -->
      <div class="alert" id="alertMsg"></div>

      <div id="registerForm">

        <!-- Name -->
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input
              type="text"
              id="name"
              class="form-input"
              placeholder="John Doe"
              autocomplete="name"
            />
          </div>
          <span class="form-error" id="nameError"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
            />
          </div>
          <span class="form-error" id="emailError"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="Min 8 chars, 1 uppercase, 1 number"
            />
            <button type="button" class="input-toggle" id="togglePassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input
              type="password"
              id="confirmPassword"
              class="form-input"
              placeholder="Re-enter your password"
            />
            <button type="button" class="input-toggle" id="toggleConfirm">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="form-error" id="confirmPasswordError"></span>
        </div>

        <!-- Password strength indicator -->
        <div id="strengthBar" style="margin-bottom:1.25rem; display:none;">
          <div style="display:flex; justify-content:space-between; margin-bottom:0.25rem;">
            <span style="font-size:0.75rem; color:var(--text-muted);">Password strength</span>
            <span style="font-size:0.75rem;" id="strengthLabel"></span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="strengthFill" style="width:0%"></div>
          </div>
        </div>

        <button class="btn btn-primary" id="registerBtn" style="margin-top:0.5rem;">
          <i class="fas fa-user-plus"></i> Create Account
        </button>

        <hr class="divider" />

        <p style="text-align:center; font-size:0.875rem; color:var(--text-secondary);">
          Already have an account?
          <a href="login.html" class="link">Sign in</a>
        </p>

      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
