<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — BudgeIt</title>

  <!-- Prevent theme flash -->
  <script>
    (function() {
      const t = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- Theme Toggle (top right) -->
  <div style="position:fixed;top:1rem;right:1rem;z-index:999;">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <i class="fas fa-moon" id="themeIcon"></i>
    </button>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <i class="fas fa-wallet"></i>
        </div>
        <span class="auth-logo-text">BudgeIt</span>
      </div>

      <!-- Title -->
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <!-- Alert -->
      <div class="alert" id="alertMsg"></div>

      <!-- Form -->
      <div id="loginForm">

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
            />
          </div>
          <span class="form-error" id="emailError"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <button type="button" class="input-toggle" id="togglePassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <!-- Submit -->
        <button class="btn btn-primary" id="loginBtn" style="margin-top:0.5rem;">
          <i class="fas fa-arrow-right-to-bracket"></i> Sign In
        </button>

        <hr class="divider" />

        <p style="text-align:center; font-size:0.875rem; color:var(--text-secondary);">
          Don't have an account?
        <a href="/pages/register.html" class="link">Create one</a>
        </p>

      </div>
    </div>
  </div>

  <!-- Shared JS -->
  <script src="../js/app.js"></script>

  <!-- Login Logic -->
  <script src="../js/login.js"></script>

</body>
</html>
