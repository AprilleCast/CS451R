<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Budgets - BudgeIt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root { --navy:#0f172a; --muted:#64748b; --primary:#3b82f6; --warn:#f59e0b; --danger:#dc2626; --ok:#16a34a; }
    body { background: linear-gradient(180deg,#eaf3ff 0%,#f8fbff 45%,#f8fafc 100%); color:var(--navy); }
    .navbar { background: linear-gradient(90deg,#1e3a8a,#3b82f6)!important; box-shadow:0 8px 24px rgba(37,99,235,.18); }
    .nav-btn { border-radius:999px; padding:.45rem 1rem; border:1px solid rgba(255,255,255,.45); color:#fff; }
    .nav-btn:hover,.nav-btn.active { background:#fff; color:#1e3a8a; border-color:#fff; }
    .hero-box,.card { background:rgba(255,255,255,.93); border:1px solid rgba(59,130,246,.12); border-radius:20px; box-shadow:0 10px 30px rgba(37,99,235,.08); }
    .hero-box { padding:1.4rem 1.6rem; }
    .page-title { font-weight:800; margin:0; }
    .subtle { color:var(--muted); }
    .form-control,.form-select { border-radius:12px; min-height:44px; }
    .budget-item { border:1px solid #e7eefb; border-radius:16px; padding:1rem; margin-bottom:.85rem; }
    .budget-meta { font-size:.9rem; color:var(--muted); }
    .status-pill { font-size:.76rem; font-weight:700; padding:.22rem .6rem; border-radius:999px; }
    .status-on_track { background:#dcfce7; color:#166534; }
    .status-near_limit { background:#fef3c7; color:#92400e; }
    .status-exceeded { background:#fee2e2; color:#991b1b; }
    .progress { height:10px; border-radius:999px; background:#e5eefc; }
    .progress-bar.near { background:var(--warn); }
    .progress-bar.over { background:var(--danger); }
    .progress-bar.good { background:var(--ok); }
    .empty-state { text-align:center; color:var(--muted); padding:2rem 0; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark py-3">
    <div class="container">
      <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-wallet2 me-2"></i>BudgeIt</a>
      <div class="ms-auto d-flex flex-wrap gap-2">
        <a href="dashboard.html" class="btn nav-btn">Dashboard</a>
        <a href="transactions.html" class="btn nav-btn">Transactions</a>
        <a href="budgets.html" class="btn nav-btn active">Budgets</a>
        <a href="profile.html" class="btn nav-btn">Profile</a>
      </div>
    </div>
  </nav>

  <main class="container py-4" style="max-width: 1150px;">
    <section class="hero-box mb-4">
      <div class="d-flex flex-wrap justify-content-between align-items-end gap-3">
        <div>
          <h1 class="page-title h2">Budgets</h1>
          <div class="subtle">Create and track category budgets against your spending</div>
        </div>
      </div>
    </section>

    <div class="card p-4 mb-4">
      <h2 class="h5 fw-bold mb-1">Create / Update Budget</h2>
      <div class="subtle mb-3">Set a category limit for weekly, monthly, or custom periods</div>
      <form id="budgetForm" class="row g-3">
        <input type="hidden" id="budgetId" />
        <div class="col-md-4">
          <label class="form-label">Category</label>
          <input type="text" id="category" class="form-control" placeholder="e.g. Food" required />
        </div>
        <div class="col-md-3">
          <label class="form-label">Spending Limit</label>
          <input type="number" step="0.01" min="0.01" id="limitAmount" class="form-control" placeholder="500" required />
        </div>
        <div class="col-md-3">
          <label class="form-label">Timeframe</label>
          <select id="timeframe" class="form-select" required>
            <option value="monthly">Monthly</option>
            <option value="weekly">Weekly</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="col-md-3 custom-only d-none">
          <label class="form-label">Start Date</label>
          <input type="date" id="startDate" class="form-control" />
        </div>
        <div class="col-md-3 custom-only d-none">
          <label class="form-label">End Date</label>
          <input type="date" id="endDate" class="form-control" />
        </div>
        <div class="col-md-3 d-grid">
          <label class="form-label invisible">Action</label>
          <button class="btn btn-primary" id="submitBtn">Save Budget</button>
        </div>
      </form>
      <div id="formAlert" class="mt-3"></div>
    </div>

    <div class="card p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 fw-bold mb-0">Budget Tracking</h2>
      </div>
      <div id="budgetList"></div>
      <div id="emptyState" class="empty-state d-none">No budgets yet. Add one to start tracking your category spending.</div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/pages/login.html";

    const authHeaders = () => ({
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    });

    const money = (n) => Number(n || 0).toLocaleString(undefined, { style: "currency", currency: "USD" });

    const setAlert = (message, type = "danger") => {
      document.getElementById("formAlert").innerHTML = `<div class="alert alert-${type} mb-0">${message}</div>`;
    };

    const clearForm = () => {
      document.getElementById("budgetForm").reset();
      document.getElementById("budgetId").value = "";
      document.getElementById("submitBtn").textContent = "Save Budget";
      document.getElementById("formAlert").innerHTML = "";
      toggleCustomFields();
    };

    const toggleCustomFields = () => {
      const isCustom = document.getElementById("timeframe").value === "custom";
      document.querySelectorAll(".custom-only").forEach((el) => el.classList.toggle("d-none", !isCustom));
      document.getElementById("startDate").required = isCustom;
      document.getElementById("endDate").required = isCustom;
    };

    const renderBudgets = (budgets) => {
      const list = document.getElementById("budgetList");
      const empty = document.getElementById("emptyState");
      list.innerHTML = "";

      if (!budgets.length) {
        empty.classList.remove("d-none");
        return;
      }
      empty.classList.add("d-none");

      budgets.forEach((b) => {
        const pct = Math.min(b.percentUsed, 100);
        const barClass = b.status === "exceeded" ? "over" : b.status === "near_limit" ? "near" : "good";
        const warningText = b.status === "exceeded"
          ? `Over budget by ${money(b.exceededBy)}`
          : b.status === "near_limit"
            ? "Warning: near budget limit"
            : "On track";

        const item = document.createElement("div");
        item.className = "budget-item";
        item.innerHTML = `
          <div class="d-flex justify-content-between align-items-start gap-2">
            <div>
              <div class="fw-bold">${b.category}</div>
              <div class="budget-meta text-capitalize">${b.timeframe} • ${b.startDate} to ${b.endDate}</div>
            </div>
            <span class="status-pill status-${b.status}">${b.status.replace("_", " ")}</span>
          </div>
          <div class="mt-2 mb-1 d-flex justify-content-between small">
            <span>Spent ${money(b.amountSpent)} / ${money(b.limitAmount)}</span>
            <span>${b.percentUsed}%</span>
          </div>
          <div class="progress mb-2">
            <div class="progress-bar ${barClass}" style="width:${pct}%"></div>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <div class="small ${b.status === "exceeded" ? "text-danger" : b.status === "near_limit" ? "text-warning" : "text-success"}">${warningText}</div>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-primary btn-sm" data-action="edit" data-budget='${JSON.stringify(b).replace(/'/g, "&apos;")}'>Edit</button>
              <button class="btn btn-outline-danger btn-sm" data-action="delete" data-id="${b.id}">Delete</button>
            </div>
          </div>
          <div class="small mt-1 subtle">Remaining: ${money(b.remainingAmount)}</div>
        `;
        list.appendChild(item);
      });
    };

    const loadBudgets = async () => {
      const res = await fetch("/api/budgets", { headers: authHeaders() });
      const payload = await res.json();
      if (!res.ok || !payload.success) throw new Error(payload.message || "Failed to load budgets.");
      renderBudgets(payload.data || []);
    };

    document.getElementById("timeframe").addEventListener("change", toggleCustomFields);

    document.getElementById("budgetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const budgetId = document.getElementById("budgetId").value;
      const body = {
        category: document.getElementById("category").value.trim(),
        limitAmount: Number(document.getElementById("limitAmount").value),
        timeframe: document.getElementById("timeframe").value,
        startDate: document.getElementById("startDate").value || null,
        endDate: document.getElementById("endDate").value || null
      };

      if (!body.category || !body.limitAmount) {
        setAlert("Category and spending limit are required.");
        return;
      }
      if (body.timeframe === "custom" && (!body.startDate || !body.endDate)) {
        setAlert("Custom timeframe requires both start and end dates.");
        return;
      }

      const url = budgetId ? `/api/budgets/${budgetId}` : "/api/budgets";
      const method = budgetId ? "PUT" : "POST";
      const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
      const payload = await res.json();
      if (!res.ok || !payload.success) {
        setAlert(payload.message || payload.error || "Failed to save budget.");
        return;
      }

      setAlert(budgetId ? "Budget updated." : "Budget created.", "success");
      clearForm();
      await loadBudgets();
    });

    document.getElementById("budgetList").addEventListener("click", async (e) => {
      const action = e.target.dataset.action;
      if (!action) return;

      if (action === "delete") {
        const id = Number(e.target.dataset.id);
        if (!confirm("Delete this budget?")) return;
        const res = await fetch(`/api/budgets/${id}`, { method: "DELETE", headers: authHeaders() });
        const payload = await res.json();
        if (!res.ok || !payload.success) {
          setAlert(payload.message || "Failed to delete budget.");
          return;
        }
        await loadBudgets();
      }

      if (action === "edit") {
        const budget = JSON.parse(e.target.dataset.budget);
        document.getElementById("budgetId").value = budget.id;
        document.getElementById("category").value = budget.category;
        document.getElementById("limitAmount").value = budget.limitAmount;
        document.getElementById("timeframe").value = budget.timeframe;
        toggleCustomFields();
        if (budget.timeframe === "custom") {
          document.getElementById("startDate").value = budget.startDate;
          document.getElementById("endDate").value = budget.endDate;
        }
        document.getElementById("submitBtn").textContent = "Update Budget";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    loadBudgets().catch((error) => {
      setAlert(error.message || "Failed to load budgets.");
      console.error(error);
    });
  </script>
</body>
</html>
